<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0A;--bg2:#131313;--bg3:#1A1A1A;--bg4:#212121;
  --red:#C8102E;--red2:rgba(200,16,46,.13);--red3:rgba(200,16,46,.3);
  --border:#262626;--border2:#313131;
  --text:#F0F0EC;--text2:#B0B0A8;--text3:#6E6E66;
  --green:#22C55E;--green2:rgba(34,197,94,.12);
  --amber:#F59E0B;--amber2:rgba(245,158,11,.12);
  --blue:#38BDF8;--blue2:rgba(56,189,248,.1);
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --nav-h:56px;--bnav-h:64px;
  --r:14px;--r-sm:10px;--r-lg:18px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{min-height:100vh;min-height:100dvh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Typography */
.h1{font:800 clamp(28px,7vw,42px)/1.1 var(--font-head)}
.h2{font:700 clamp(18px,4vw,26px)/1.2 var(--font-head)}
.h3{font:700 16px/1.3 var(--font-head)}
.muted{color:var(--text3);font-size:13px;line-height:1.4}
.label{color:var(--text2);font-size:13px;font-weight:500;display:block;margin-bottom:7px}

/* Page layout */
.page{max-width:480px;margin:0 auto;padding:18px 15px 90px;animation:pgIn .2s ease}
.page-wide{max-width:920px;margin:0 auto;padding:24px 18px 32px;animation:pgIn .2s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* Top nav */
.nav{background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 15px;height:var(--nav-h);position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.nav-badge{background:var(--red);color:#fff;font:800 11px var(--font-head);padding:3px 8px;border-radius:5px;letter-spacing:.6px}
.nav-title{font:700 14px var(--font-head);color:var(--text)}
.nav-right{display:flex;align-items:center;gap:6px}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--bnav-h) + env(safe-area-inset-bottom,0px));background:rgba(10,10,10,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;z-index:100;padding:6px 0 0}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;border:none;background:none;outline:none;transition:color .15s;position:relative}
.bni.on{color:var(--red)}
.bni svg{transition:transform .15s}
.bni.on svg{transform:scale(1.1)}
.bni-dot{position:absolute;top:6px;right:calc(50% - 14px);width:6px;height:6px;background:var(--red);border-radius:50%;border:2px solid var(--bg)}

/* Buttons */
.btn{font-family:var(--font-head);font-weight:700;cursor:pointer;border:none;transition:all .15s;outline:none;display:inline-flex;align-items:center;gap:6px;justify-content:center;user-select:none;letter-spacing:.2px}
.btn-primary{background:var(--red);color:#fff;padding:14px 22px;border-radius:var(--r);font-size:15px}
.btn-primary:not(:disabled):active{background:#a50d24;transform:scale(.98)}
.btn-primary:disabled{opacity:.38;cursor:not-allowed}
.btn-block{width:100%}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);padding:12px 18px;border-radius:var(--r);font-size:14px}
.btn-secondary:active{opacity:.75}
.btn-ghost{background:none;color:var(--red);font:700 13px var(--font-head);padding:4px 0;cursor:pointer;border:none;outline:none}
.btn-nav{background:none;color:var(--text3);border:1px solid var(--border);padding:7px 13px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font-body);font-weight:500;transition:all .15s}
.btn-nav.on{background:var(--red);border-color:var(--red);color:#fff}
.btn-icon{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:9px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:active{background:var(--bg4)}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:17px}
.card-lg{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px}
.card-accent{background:linear-gradient(135deg,#130707,var(--bg2));border-color:var(--red3)}

/* Inputs — font-size 16px prevents iOS zoom */
.inp{background:var(--bg3);border:1.5px solid var(--border2);color:var(--text);padding:13px 14px;border-radius:var(--r);font-size:16px;width:100%;outline:none;font-family:var(--font-body);transition:border-color .15s;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:var(--red);background:var(--bg4)}
.inp::placeholder{color:var(--text3)}
textarea.inp{resize:none;line-height:1.8;min-height:240px;font-size:15px}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--red2);color:var(--red);border:1px solid var(--red3);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.tag-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border);padding:3px 9px;border-radius:20px;font-size:12px}
.badge{padding:5px 13px;border-radius:20px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
.badge-green{background:var(--green2);color:var(--green);border:1px solid rgba(34,197,94,.22)}
.badge-amber{background:var(--amber2);color:var(--amber);border:1px solid rgba(245,158,11,.22)}
.badge-red{background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.22)}

/* Flex/Grid helpers */
.flex-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.stack{display:flex;flex-direction:column;gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

/* Essay type selection — 2 cols on mobile */
.essay-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
@media(max-width:520px){.essay-grid{grid-template-columns:1fr 1fr}}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}

.divider{border-top:1px solid var(--border);margin:16px 0}

/* Essay cards */
.essay-card{padding:12px;border-radius:12px;cursor:pointer;border:1.5px solid var(--border);background:var(--bg3);transition:all .15s;user-select:none}
.essay-card:active{transform:scale(.96)}
.essay-card.on{border-color:var(--accent,var(--red));background:rgba(var(--accent-rgb,200,16,46),.1)}
.essay-card .ec-icon{font-size:20px;margin-bottom:6px}
.essay-card .ec-label{font:700 12px var(--font-head);color:var(--text)}
.essay-card .ec-desc{font-size:10px;color:var(--text3);margin-top:2px}

/* Cat cards */
.cat-card{padding:10px 5px;border-radius:10px;cursor:pointer;border:1.5px solid var(--border);background:var(--bg3);text-align:center;transition:all .15s;user-select:none}
.cat-card:active{transform:scale(.94)}
.cat-card.on{background:var(--red2);border-color:var(--red)}
.cat-card .cc-icon{font-size:18px;margin-bottom:3px}
.cat-card .cc-label{font-size:9.5px;font-weight:600;color:var(--text3)}
.cat-card.on .cc-label{color:var(--text2)}

/* Tab */
.tab-btn{flex:1;padding:12px 8px;border-radius:10px;cursor:pointer;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s;font-size:13px;font-family:var(--font-body);user-select:none}
.tab-btn.on{background:var(--red2);border-color:var(--red);color:var(--text)}

/* Score rings */
.score-rings{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:10px;padding:14px 4px}

/* Sub items */
.sub-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:border-color .15s;user-select:none}
.sub-item:active{border-color:var(--border2)}

/* Alert */
.alert{border-radius:10px;padding:11px 14px;font-size:13px;line-height:1.5}
.alert-err{background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.2)}
.alert-ok{background:var(--green2);color:var(--green);border:1px solid rgba(34,197,94,.22)}
.alert-info{background:var(--blue2);color:var(--blue);border:1px solid rgba(56,189,248,.18)}
.alert-warn{background:var(--amber2);color:var(--amber);border:1px solid rgba(245,158,11,.22)}

/* Struct tip */
.struct-tip{background:var(--bg4);border-radius:10px;padding:12px 14px;border-left:3px solid var(--accent,var(--red));margin-top:12px}

/* Progress */
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width .3s}

/* Spinner */
.spin{width:34px;height:34px;border:3px solid var(--bg3);border-top-color:var(--red);border-radius:50%;animation:s .7s linear infinite;margin:0 auto 12px}
@keyframes s{to{transform:rotate(360deg)}}

/* Center wrappers */
.center-wrap{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}

/* Feedback items */
.fb-item{display:flex;gap:9px;margin-bottom:9px;align-items:flex-start}
.fb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* ── TOAST ─────────────────────────── */
#toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 28px);max-width:360px}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:12px 15px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:tIn .25s ease;box-shadow:0 8px 28px rgba(0,0,0,.5)}
.toast-ok{color:var(--green);border-color:rgba(34,197,94,.3)}
.toast-err{color:#EF4444;border-color:rgba(239,68,68,.3)}
.toast-info{color:var(--blue);border-color:rgba(56,189,248,.2)}
@keyframes tIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── LANDING ───────────────────────── */
.landing-hero{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:radial-gradient(ellipse at 30% 20%,rgba(200,16,46,.1) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(56,189,248,.05) 0%,transparent 50%)}
.hero-content{max-width:480px;width:100%;margin:0 auto;padding:40px 20px 32px;flex:1;display:flex;flex-direction:column;justify-content:center}
.landing-features{background:var(--bg2);border-top:1px solid var(--border);padding:32px 20px}
.landing-features-inner{max-width:480px;margin:0 auto}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.feat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:8px}
.feat-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.feat-title{font:700 13px var(--font-head);color:var(--text)}
.feat-desc{font-size:11.5px;color:var(--text3);line-height:1.4}
.stats-row{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--bg3);margin-bottom:20px}
.stat-cell{flex:1;padding:14px 10px;text-align:center;border-right:1px solid var(--border)}
.stat-cell:last-child{border-right:none}
.stat-n{font:800 20px var(--font-head);color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px}

/* ── PROFILE ───────────────────────── */
.avatar{width:72px;height:72px;border-radius:50%;background:var(--red2);border:2px solid var(--red3);display:flex;align-items:center;justify-content:center;font:800 28px var(--font-head);color:var(--red);margin:0 auto 14px}

/* ── PRACTICE MODE CARDS ───────────── */
.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:22px}
.mode-card{padding:14px 10px;border-radius:var(--r);cursor:pointer;border:1.5px solid var(--border);background:var(--bg3);text-align:center;transition:all .15s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:5px}
.mode-card:active{transform:scale(.96)}
.mode-card.on{border-color:var(--accent,var(--red));background:rgba(var(--accent-rgb,200,16,46),.1)}
.mode-card .mc-icon{font-size:22px}
.mode-card .mc-title{font:700 13px var(--font-head);color:var(--text)}
.mode-card .mc-desc{font-size:10px;color:var(--text3);line-height:1.3}
.mode-card.on .mc-desc{color:var(--text2)}

/* ── EXAM TIMER ─────────────────────── */
.exam-timer{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.exam-timer.warning{border-color:rgba(245,158,11,.5);background:var(--amber2)}
.exam-timer.danger{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.1)}
.timer-display{font:800 28px var(--font-head);color:var(--text);letter-spacing:2px}
.exam-timer.warning .timer-display{color:var(--amber)}
.exam-timer.danger .timer-display{color:#EF4444}
.exam-phase-bar{display:flex;gap:0;border-radius:20px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);margin-bottom:14px}
.exam-phase-seg{flex:1;padding:8px 6px;text-align:center;font-size:11px;font-weight:700;color:var(--text3);transition:all .2s}
.exam-phase-seg.active{background:var(--red);color:#fff}
.exam-phase-seg.done{background:var(--green2);color:var(--green)}

/* ── CUSTOM TOPIC ───────────────────── */
.custom-topic-box{background:var(--bg3);border:1.5px dashed var(--border2);border-radius:var(--r);padding:15px;margin-bottom:16px;transition:border-color .2s}
.custom-topic-box:focus-within{border-color:var(--red);border-style:solid}

/* ── RESPONSIVE ─────────────────────── */
@media(min-width:600px){
  .page{padding:24px 20px 48px}
  .hero-content{padding:60px 24px 48px}
}


</style>
</head>

  return bank[Math.floor(Math.random() * bank.length)];
}

/* ── MINI CHART PREVIEWS (SVG) ─────────────── */
function miniChartSVG(type) {
  const bg='#0E0E0E', g1='#1E1E1E', g2='#2A2A2A', t='#888';
  const W=200, H=124;
  const s=`width:100%;max-width:${W}px;height:${H}px;display:block`;

  if(type==='line') {
    // Internet users % — 3 countries 2000-2020
    const data=[
      {n:'UK',  c:'#38BDF8', v:[42,54,66,74,80,84,88,91]},
      {n:'Brazil',c:'#22C55E',v:[12,18,26,35,44,53,61,70]},
      {n:'India', c:'#F59E0B',v:[1,3,7,12,19,26,34,41]},
    ];
    const yrs=['00','02','04','06','08','10','12','14'];
    const ml=26,mr=8,mt=12,mb=30,cW=W-ml-mr,cH=H-mt-mb;
    const xP=i=>ml+i*(cW/(yrs.length-1));
    const yP=v=>mt+cH*(1-v/100);
    let paths='',dots='',lbls='';
    data.forEach(d=>{
      const pts=d.v.map((v,i)=>`${xP(i).toFixed(1)},${yP(v).toFixed(1)}`).join(' ');
      paths+=`<polyline points="${pts}" fill="none" stroke="${d.c}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
      d.v.forEach((v,i)=>{dots+=`<circle cx="${xP(i).toFixed(1)}" cy="${yP(v).toFixed(1)}" r="2.5" fill="${d.c}" stroke="${bg}" stroke-width="1.2"/>`;});
    });
    // y ticks
    let ytx='';
    [0,25,50,75,100].forEach(v=>{
      const y=yP(v);
      ytx+=`<line x1="${ml}" y1="${y.toFixed(1)}" x2="${W-mr}" y2="${y.toFixed(1)}" stroke="${g2}" stroke-width="${v===0?1.2:.5}"/>`;
      ytx+=`<text x="${ml-3}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="8" fill="${t}">${v}</text>`;
    });
    // x labels
    yrs.forEach((y,i)=>{ lbls+=`<text x="${xP(i).toFixed(1)}" y="${H-mb+13}" text-anchor="middle" font-size="8" fill="${t}">${y}</text>`; });
    // legend
    let leg=''; const lx=ml;
    data.forEach((d,i)=>{leg+=`<rect x="${lx+i*56}" y="${H-9}" width="8" height="5" fill="${d.c}" rx="1"/><text x="${lx+i*56+11}" y="${H-4}" font-size="7.5" fill="${t}">${d.n}</text>`;});
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="${s}">
      <rect width="${W}" height="${H}" fill="${bg}" rx="8"/>
      <text x="${W/2}" y="9" text-anchor="middle" font-size="8" font-weight="600" fill="#CCC">Internet users (%)</text>
      ${ytx}${paths}${dots}${lbls}${leg}
    </svg>`;
  }

  if(type==='bar') {
    // CO2 emissions — 4 countries, 2 years
    const cats=['UK','USA','China','India'];
    const s1={n:'2010',c:'#38BDF8',v:[8,18,7,2]};
    const s2={n:'2020',c:'#C8102E',v:[5,15,11,3]};
    const ml=22,mr=8,mt=14,mb=28,cW=W-ml-mr,cH=H-mt-mb;
    const grpW=cW/cats.length, bW=Math.min(14,(grpW-8)/2);
    const maxV=20;
    const yP=v=>mt+cH*(1-v/maxV);
    let bars='',xlbls='',ytx='';
    [0,5,10,15,20].forEach(v=>{
      const y=yP(v);
      ytx+=`<line x1="${ml}" y1="${y.toFixed(1)}" x2="${W-mr}" y2="${y.toFixed(1)}" stroke="${g2}" stroke-width="${v===0?1.2:.5}"/>`;
      ytx+=`<text x="${ml-3}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="8" fill="${t}">${v}</text>`;
    });
    cats.forEach((c,i)=>{
      const cx=ml+i*grpW+grpW/2;
      [s1,s2].forEach((s,si)=>{
        const bx=cx+(si===0?-bW-1:1), bH=(s.v[i]/maxV)*cH;
        bars+=`<rect x="${bx.toFixed(1)}" y="${yP(s.v[i]).toFixed(1)}" width="${bW}" height="${Math.max(1,bH).toFixed(1)}" fill="${s.c}" rx="2" opacity=".9"/>`;
      });
      xlbls+=`<text x="${cx.toFixed(1)}" y="${H-mb+11}" text-anchor="middle" font-size="8" fill="${t}">${c}</text>`;
    });
    const leg=`<rect x="${ml}" y="${H-8}" width="8" height="5" fill="${s1.c}" rx="1"/><text x="${ml+11}" y="${H-3}" font-size="7.5" fill="${t}">${s1.n}</text>
      <rect x="${ml+36}" y="${H-8}" width="8" height="5" fill="${s2.c}" rx="1"/><text x="${ml+47}" y="${H-3}" font-size="7.5" fill="${t}">${s2.n}</text>`;
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="${s}">
      <rect width="${W}" height="${H}" fill="${bg}" rx="8"/>
      <text x="${W/2}" y="10" text-anchor="middle" font-size="8" font-weight="600" fill="#CCC">CO₂ emissions (tonnes/person)</text>
      ${ytx}${bars}${xlbls}${leg}
    </svg>`;
  }

  if(type==='pie') {
    // Energy sources pie
    const segs=[
      {l:'Coal',  v:36, c:'#C8102E'},
      {l:'Gas',   v:24, c:'#F59E0B'},
      {l:'Nuclear',v:19,c:'#38BDF8'},
      {l:'Solar', v:12, c:'#22C55E'},
      {l:'Other', v:9,  c:'#7C3AED'},
    ];
    const cx=68, cy=60, r=46, ir=22;
    let total=0; segs.forEach(s=>total+=s.v);
    let angle=-Math.PI/2, paths='';
    segs.forEach(seg=>{
      const sw=(seg.v/total)*2*Math.PI;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+sw),y2=cy+r*Math.sin(angle+sw);
      const xi1=cx+ir*Math.cos(angle),yi1=cy+ir*Math.sin(angle);
      const xi2=cx+ir*Math.cos(angle+sw),yi2=cy+ir*Math.sin(angle+sw);
      const lg=sw>Math.PI?1:0;
      paths+=`<path d="M${xi1.toFixed(1)},${yi1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ir},${ir} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)}" fill="${seg.c}" opacity=".92"/>`;
      if(seg.v/total>0.09){const ma=angle+sw/2;paths+=`<text x="${(cx+(r*.72)*Math.cos(ma)).toFixed(1)}" y="${(cy+(r*.72)*Math.sin(ma)+4).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="white">${seg.v}%</text>`;}
      angle+=sw;
    });
    let leg=''; segs.forEach((s,i)=>{leg+=`<rect x="128" y="${12+i*18}" width="9" height="9" fill="${s.c}" rx="2"/><text x="141" y="${19+i*18+1}" font-size="8.5" fill="#BBB">${s.l} ${s.v}%</text>`;});
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="${s}">
      <rect width="${W}" height="${H}" fill="${bg}" rx="8"/>
      <text x="${cx}" y="9" text-anchor="middle" font-size="8" font-weight="600" fill="#CCC">Energy sources</text>
      ${paths}
      <circle cx="${cx}" cy="${cy}" r="${ir}" fill="${bg}"/>
      ${leg}
    </svg>`;
  }

  if(type==='map') {
    // Before → After floor plan
    const lw=2, lc='#059669', fill='#05966912', fill2='#05966930', tc='#6EE7B7';
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="${s}">
      <rect width="${W}" height="${H}" fill="${bg}" rx="8"/>
      <!-- BEFORE label -->
      <text x="47" y="12" text-anchor="middle" font-size="8.5" font-weight="700" fill="${lc}">BEFORE</text>
      <!-- Before floor plan -->
      <rect x="6" y="16" width="82" height="66" fill="${fill}" stroke="${lc}" stroke-width="${lw}" rx="3"/>
      <line x1="6" y1="49" x2="88" y2="49" stroke="${lc}" stroke-width="1"/>
      <line x1="47" y1="16" x2="47" y2="82" stroke="${lc}" stroke-width="1"/>
      <text x="26" y="36" text-anchor="middle" font-size="7" fill="${tc}">Hall</text>
      <text x="68" y="32" text-anchor="middle" font-size="7" fill="${tc}">Office</text>
      <text x="26" y="62" text-anchor="middle" font-size="7" fill="${tc}">Park</text>

  if(type==='process') {

    const c='#D97706', cf='#D9770618', cb='#D97706';
    const steps=[
      {x:10,  y:14, w:56, h:24, n:'1', txt:'Limestone\n& clay'},

      boxes+=`<text x="${s.x+10}" y="${s.y+16}" text-anchor="middle" font-size="8" font-weight="800" fill="white">${s.n}</text>`;
      const lines=s.txt.split('\n');
      lines.forEach((ln,li)=>{ boxes+=`<text x="${s.x+s.w/2+4}" y="${s.y+(s.h/2)+(li-lines.length/2+.7)*9}" text-anchor="middle" font-size="7.5" fill="#FDE68A">${ln}</text>`; });
    });
    // arrows
    const arrows=`
      <line x1="66" y1="26" x2="74" y2="26" stroke="${c}" stroke-width="1.5"/><polygon points="73,23 77,26 73,29" fill="${c}"/>
      <line x1="130" y1="26" x2="138" y2="26" stroke="${c}" stroke-width="1.5"/><polygon points="137,23 141,26 137,29" fill="${c}"/>
      <path d="M166,38 Q166,45 156,45 Q140,45 136,52" stroke="${c}" stroke-width="1.5" fill="none"/><polygon points="133,51 136,55 139,51" fill="${c}"/>
      <line x1="102" y1="64" x2="110" y2="64" stroke="${c}" stroke-width="1.5"/><polygon points="109,61 113,64 109,67" fill="${c}"/>

  if(type==='table') {
    // Metro systems table
    const c='#0891B2', ch='#0891B240', ht='#0EA5E9';
    const hdrs=['City','Opened','Length','Riders/yr'];
    const rows=[
      ['London','1863','394 km','775M'],
      ['Tokyo', '1927','282 km','1,927M ↑'],
      ['Paris', '1900','201 km','1,191M'],
      ['LA',    '2001','28 km', '50M ↓'],
    ];
    const colW=[44,34,40,54], rH=18, headerH=20, x0=4;
    const tH=headerH+rows.length*rH+4;
    let hcells='',rcells='',vlines='';
    let cx=x0;
    hdrs.forEach((h,i)=>{
      hcells+=`<text x="${(cx+colW[i]/2).toFixed(1)}" y="${headerH/2+6}" text-anchor="middle" font-size="8.5" font-weight="700" fill="${ht}">${h}</text>`;

      });

    const pLabels=['UK','US','EU','Asia'];
    const pcx=150,pcy=H/2,pr=36,pir=18;
    let pAngle=-Math.PI/2, pieP='';
    let pTot=0; pSegs.forEach(s=>pTot+=s.v);
    pSegs.forEach((seg,si)=>{
      const sw=(seg.v/pTot)*2*Math.PI;
      const x1=pcx+pr*Math.cos(pAngle),y1=pcy+pr*Math.sin(pAngle);
      const x2=pcx+pr*Math.cos(pAngle+sw),y2=pcy+pr*Math.sin(pAngle+sw);
      const xi1=pcx+pir*Math.cos(pAngle),yi1=pcy+pir*Math.sin(pAngle);
      const xi2=pcx+pir*Math.cos(pAngle+sw),yi2=pcy+pir*Math.sin(pAngle+sw);
      const lg=sw>Math.PI?1:0;
      pieP+=`<path d="M${xi1.toFixed(1)},${yi1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${pr},${pr} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${pir},${pir} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)}" fill="${seg.c}" opacity=".9"/>`;
      if(seg.v/pTot>0.12){const ma=pAngle+sw/2;pieP+=`<text x="${(pcx+(pr*.72)*Math.cos(ma)).toFixed(1)}" y="${(pcy+(pr*.72)*Math.sin(ma)+3.5).toFixed(1)}" text-anchor="middle" font-size="8" font-weight="700" fill="white">${seg.v}%</text>`;}
      pAngle+=sw;
    });
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="${s}">
      <rect width="${W}" height="${H}" fill="${bg}" rx="8"/>
      <line x1="${lW+4}" y1="8" x2="${lW+4}" y2="${H-8}" stroke="${g2}" stroke-width="1"/>

      ${ylbls}
      <path d="${areaPath}" fill="${lc}18"/>
      <polyline points="${linePts}" fill="none" stroke="${lc}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${vals.map((v,i)=>`<circle cx="${xP(i).toFixed(1)}" cy="${yP(v).toFixed(1)}" r="2.2" fill="${lc}" stroke="${bg}" stroke-width="1"/>`).join('')}
      ${xlbls2}
      <text x="${pcx}" y="10" text-anchor="middle" font-size="7.5" font-weight="600" fill="#CCC">Source (%)</text>
      ${pieP}
      <circle cx="${pcx}" cy="${pcy}" r="${pir}" fill="${bg}"/>
      ${pSegs.map((s,i)=>`<rect x="${pcx-pr-4}" y="${H-18+i*0}" width="0" height="0" fill="${s.c}"/>`).join('')}
      <rect x="${lW+8}" y="${H-22}" width="52" height="18" fill="${bg}88" rx="3"/>
      ${pSegs.map((s,i)=>`<rect x="${lW+10}" y="${H-20+i*4.5}" width="5" height="3.5" fill="${s.c}" rx="1"/><text x="${lW+18}" y="${H-17+i*4.5}" font-size="6.5" fill="#BBB">${pLabels[i]} ${s.v}%</text>`).join('')}
    </svg>`;
  }

  return `<span style="font-size:22px">${type}</span>`;
}

const LS = {
  get: (k, def) => { try { return JSON.parse(localStorage.getItem(k) || 'null') ?? def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

const DB = {
  /* Sync getters from state */
  users()    { return S.users; },
  subs()     { return S.subs; },
  settings() { return S.settings; },

  /* ── Users ── */
  async loadUsers() {
    if (sb) {
      try {
        const { data, error } = await sb.from('ielts_users').select('*');
        if (!error && data?.length) { S.users = data; LS.set('iu', data); return; }
      } catch(e) { console.warn('SB users:', e); }
    }
    const def = [{id:'t0',name:'Muhammad ustoz',telegram:'teacher_demo',password:'1234',role:'teacher',created_at:'2024-01-01'}];
    S.users = LS.get('iu', def);
    if (!S.users.find(u => u.id === 't0')) S.users.push(def[0]);
  },

  async saveUsers(users) {
    S.users = users;
    LS.set('iu', users);
    if (sb) sb.from('ielts_users').upsert(users).then().catch(e => console.warn('SB saveUsers:', e));
  },

  async addUser(user) {
    S.users = [...S.users, user];
    LS.set('iu', S.users);
    if (sb) {
      try {
        const { error } = await sb.from('ielts_users').insert({
          id: user.id, name: user.name, telegram: user.telegram,
          password: user.password, role: user.role
        });
        if (error) console.warn('SB addUser error:', error.message);
      } catch(e) { console.warn('SB addUser:', e); }
    }
  },

  /* ── Submissions ── */
  async loadSubs() {
    if (sb) {
      try {
        const { data, error } = await sb.from('ielts_submissions').select('*').order('timestamp', {ascending: false});
        if (!error && data) {
          S.subs = data.map(r => ({
            id: r.id, userId: r.user_id, userName: r.user_name,
            userTelegram: r.user_telegram, taskType: r.task_type,
            essayType: r.essay_type, topic: r.topic, essay: r.essay,
            wordCount: r.word_count, scores: r.scores, timestamp: r.timestamp
          }));
          LS.set('is', S.subs); return;
        }
      } catch(e) { console.warn('SB subs:', e); }
    }
    S.subs = LS.get('is', []);
  },

  async addSub(sub) {
    S.subs = [sub, ...S.subs];
    LS.set('is', S.subs);
    if (sb) {
      try {
        const { error } = await sb.from('ielts_submissions').insert({
          id: sub.id, user_id: sub.userId, user_name: sub.userName,
          user_telegram: sub.userTelegram, task_type: sub.taskType,
          essay_type: sub.essayType, topic: sub.topic, essay: sub.essay,
          word_count: sub.wordCount, scores: sub.scores, timestamp: sub.timestamp
        });
        if (error) console.warn('SB addSub error:', error.message);
      } catch(e) { console.warn('SB addSub:', e); }
    }
  },

  async updateSub(id, patch) {
    S.subs = S.subs.map(s => s.id === id ? { ...s, ...patch } : s);
    LS.set('is', S.subs);
    if (sb) {
      try {
        const dbPatch = {};
        if (patch.scores !== undefined) dbPatch.scores = patch.scores;
        await sb.from('ielts_submissions').update(dbPatch).eq('id', id);
      } catch(e) { console.warn('SB updateSub:', e); }
    }
  },

  /* ── Settings ── */
  async loadSettings() {
    if (sb) {
      try {
        const { data, error } = await sb.from('ielts_settings').select('*').eq('id', 1).single();
        if (!error && data) { S.settings = data; LS.set('iset', data); return; }
      } catch(e) { console.warn('SB settings:', e); }
    }
    S.settings = LS.get('iset', {});
    if (!S.settings.groqApiKey) S.settings.groqApiKey = GROQ_KEY;
  },

  async saveSettings(patch) {
    S.settings = { ...S.settings, ...patch };
    LS.set('iset', S.settings);
    if (sb) sb.from('ielts_settings').upsert({ id: 1, ...S.settings }).then().catch(e => console.warn('SB saveSettings:', e));
  },
};

function toast(msg, type = 'info', ms = 3000) {
  const wrap = document.getElementById('toast-wrap');
  if (!wrap) return;
  const icons = { ok: IC.check, err: '✕', info: IC.bolt };
  const div = document.createElement('div');
  div.className = `toast toast-${type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'info'}`;
  div.innerHTML = `<span style="flex-shrink:0">${icons[type] || IC.bolt}</span><span>${msg}</span>`;
  wrap.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity .3s'; setTimeout(() => div.remove(), 300); }, ms);
}

/* ══════════════════════════════════════════
   🔥 STREAK, BADGES, MOTIV HELPERS
══════════════════════════════════════════ */
function getStreak(subs) {
  if (!subs || subs.length === 0) return 0;
  // Sort by timestamp descending
  const sorted = [...subs].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  let streak = 0;
  let checkDate = new Date(today);
  for (const sub of sorted) {
    const d = new Date(sub.timestamp);
    d.setHours(0, 0, 0, 0);
    if (d.getTime() === checkDate.getTime()) {
      // Found submission on this day
      if (streak === 0) streak = 1;
      // Move to previous day
      checkDate.setDate(checkDate.getDate() - 1);
    } else if (d.getTime() < checkDate.getTime()) {
      // Gap — streak broken
      if (streak > 0) break;
    }
  }
  return streak;
}

function getBadges(subs) {
  const badges = [];
  if (!subs || subs.length === 0) return badges;
  const n = subs.length;
  const best = Math.max(...subs.map(s => s.scores?.overall || 0));
  const streak = getStreak(subs);
  if (n >= 1)  badges.push({ icon: '✍️', label: 'Birinchi esse' });
  if (n >= 5)  badges.push({ icon: '🔥', label: '5 ta esse' });
  if (n >= 10) badges.push({ icon: '💪', label: '10 ta esse' });
  if (n >= 25) badges.push({ icon: '🏆', label: '25 ta esse' });
  if (best >= 6) badges.push({ icon: '⭐', label: 'Band 6+' });
  if (best >= 7) badges.push({ icon: '🌟', label: 'Band 7+' });
  if (best >= 8) badges.push({ icon: '💎', label: 'Band 8+' });
  if (streak >= 3)  badges.push({ icon: '📅', label: '3 kun streak' });
  if (streak >= 7)  badges.push({ icon: '🗓️', label: '7 kun streak' });
  if (streak >= 14) badges.push({ icon: '🏅', label: '14 kun streak' });
  return badges;
}

function getMotivMsg(subs) {
  if (!subs || subs.length === 0) {
    return '💡 Birinchi esseyingizni yozing va AI baho oling!';
  }
  const n = subs.length;
  const best = Math.max(...subs.map(s => s.scores?.overall || 0));
  const recent3 = subs.slice(0, 3).map(s => s.scores?.overall || 0);
  const avg3 = recent3.reduce((a, b) => a + b, 0) / recent3.length;
  if (n === 1) return '🎉 Ajoyib start! Davom eting, har esse sizni yaxshilaydi!';
  if (avg3 >= 7) return '🌟 Zo\'r natija! Band 7+ sathida ishlayapsiz. Davom eting!';
  if (avg3 >= 6) return '⭐ Yaxshi ish! Band 6+ sathida. Biroz yana harakat va Band 7 sizniki!';
  if (best >= 6) return `💪 Eng yaxshi natijangiz Band ${best}. Shu sathni barqaror qiling!`;
  return `📈 Siz allaqachon ${n} ta esse yozdingiz. Har esse — tajriba va o\'sish!`;
}

function getBandBadge(score) {
  const cls = score >= 7 ? 'badge badge-green' : score >= 5 ? 'badge badge-amber' : 'badge badge-red';
  return `<span class="${cls}">${IC.star} Band ${score} <span style="font-weight:400;font-family:var(--font-body)">– ${bandLabel(score)}</span></span>`;
}

function getScoreRing(score, label, size = 70) {
  const r = 27, circ = 2 * Math.PI * r;
  const offset = circ - (score / 9) * circ;
  const col = bandColor(score);
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:5px">
    <svg width="${size}" height="${size}" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="5"/>
      <circle cx="32" cy="32" r="${r}" fill="none" stroke="${col}" stroke-width="5"
        stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
        stroke-linecap="round" transform="rotate(-90 32 32)"/>
      <text x="32" y="37" text-anchor="middle" fill="${col}" font-size="13" font-weight="800"
        font-family="Syne,sans-serif">${score}</text>
    </svg>
    ${label ? `<span class="muted" style="font-size:10px;text-align:center;max-width:72px;line-height:1.3">${label}</span>` : ''}
  </div>`;
}

/* ══════════════════════════════════════════
   🤖 GROQ API
══════════════════════════════════════════ */
async function callGroq(system, userMsg, maxTokens = 1500, temp = 0.4) {
  const key = S.settings.groqApiKey || GROQ_KEY;
  if (!key) throw new Error('API_KEY_MISSING');
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'system', content: system }, { role: 'user', content: userMsg }],
      temperature: temp,
      max_tokens: maxTokens,
      response_format: { type: 'json_object' },
    }),
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message || 'Groq error');
  return d.choices[0].message.content;
}

/* ── EXAM TIMER ─────────────────────────── */
function startExamTimer() {
  if (S._examInterval) clearInterval(S._examInterval);
  S._examInterval = setInterval(() => {
    if (!S.examRunning) { clearInterval(S._examInterval); return; }
    S.examTimer--;
    if (S.examTimer <= 0) {
      clearInterval(S._examInterval);
      S.examRunning = false;
      if (S.examPhase === 1) {
        toast('⏰ Task 1 vaqti tugadi! Baholatib Task 2 ga o\'ting.', 'err', 5000);
      } else {
        toast('⏰ Imtihon vaqti tugadi!', 'err', 5000);
      }
    }
    // Update timer display without full re-render (performance)
    const mm = String(Math.floor(S.examTimer / 60)).padStart(2, '0');
    const ss = String(S.examTimer % 60).padStart(2, '0');
    const el = document.querySelector('.timer-display');
    if (el) el.textContent = `${mm}:${ss}`;
    const totalSec = S.examPhase === 1 ? 20*60 : 40*60;
    const usedPct = Math.max(0, Math.min(100, (1 - S.examTimer/totalSec)*100));
    const bar = document.querySelector('.exam-timer > div:last-child .progress-fill, .exam-timer div div div');
    const timerEl = document.querySelector('.exam-timer');
    if (timerEl) {
      timerEl.className = 'exam-timer ' + (S.examTimer < 120 ? 'danger' : S.examTimer < 300 ? 'warning' : '');
    }
  }, 1000);
}

OFFICIAL IELTS WRITING TASK 2 BAND DESCRIPTORS (May 2023):

=== TASK RESPONSE ===
9: Prompt appropriately addressed and explored in depth. Clear and fully developed position directly answering the question. Ideas relevant, fully extended and well supported. Extremely rare lapses.
8: Prompt appropriately and sufficiently addressed. Clear and well-developed position. Ideas relevant, well extended and supported. Occasional omissions/lapses.
7: Main parts of prompt appropriately addressed. Clear and developed position. Main ideas extended and supported but may over-generalise or lack focus/precision in supporting ideas.
6: Main parts addressed (though some more fully than others). Appropriate format. Position directly relevant but conclusions may be unclear/unjustified/repetitive. Main ideas relevant but some insufficiently developed or unclear; some supporting arguments less relevant or inadequate.
5: Main parts INCOMPLETELY addressed. Format may be inappropriate. Writer expresses position but development not always clear. Some main ideas put forward but limited and NOT sufficiently developed. May be irrelevant detail or repetition.
4: Tackled in a minimal way, or answer is tangential — possibly due to misunderstanding of prompt. Format may be inappropriate. Position discernible but reader has to read carefully to find it. Main ideas difficult to identify; those identifiable may lack relevance/clarity/support. Large parts may be repetitive.
3: NO part of prompt adequately addressed, or prompt misunderstood. No relevant position identifiable, little direct response. Few ideas, may be irrelevant or insufficiently developed.
2: Content barely related to prompt. No position. Glimpses of 1-2 ideas without development.
1: Content wholly unrelated. ≤20 words = Band 1.

=== COHERENCE & COHESION ===
9: Followed effortlessly. Cohesion very rarely attracts attention. Minimal lapses. Paragraphing skilfully managed.
8: Followed with ease. Ideas logically sequenced, cohesion well managed. Occasional lapses. Paragraphing used sufficiently and appropriately.
7: Logically organised, clear progression throughout (few minor lapses). Range of cohesive devices including reference/substitution used flexibly but with some inaccuracies or over/under use. Paragraphing generally effective, sequencing within paragraphs generally logical.
6: Generally arranged coherently, clear overall progression. Cohesive devices used to some good effect BUT cohesion within/between sentences may be faulty or mechanical (misuse, overuse, omission). Reference/substitution may lack flexibility → repetition or error. Paragraphing may not always be logical or central topic not always clear.
5: Organisation evident but NOT wholly logical, may lack overall progression. Relationship of ideas can be followed but sentences not fluently linked. Limited/overuse of cohesive devices with some inaccuracy. Writing repetitive. PARAGRAPHING MAY BE INADEQUATE OR MISSING.
4: Ideas evident but NOT coherently arranged, no clear progression. Relationships unclear/inadequately marked. Basic cohesive devices may be inaccurate or repetitive. NO paragraphing and/or no clear main topic within paragraphs.
3: No apparent logical organisation. Ideas discernible but difficult to relate. Minimal use of sequencers/cohesive devices. Difficulty identifying referencing. Any attempts at paragraphing are unhelpful.

=== LEXICAL RESOURCE ===
9: Full flexibility and precise use widely evident. Wide range used accurately/appropriately with very natural and sophisticated control. Minor errors extremely rare.
8: Wide resource fluently and flexibly used to convey precise meanings. Skilful use of uncommon/idiomatic items despite occasional inaccuracies in word choice/collocation. Occasional errors with minimal impact.
7: Sufficient to allow some flexibility and precision. Some ability to use less common/idiomatic items. Awareness of style/collocation evident though inappropriacies occur. Only a few errors in spelling/word formation, do not detract from clarity.
6: Generally adequate and appropriate. Meaning generally clear despite restricted range or lack of precision. Risk-takers use wider range but with higher inaccuracy/inappropriacy. Some errors in spelling/word formation but do not impede communication.
5: Limited but minimally adequate. Simple vocabulary may be accurate but range does not permit variation. Frequent lapses in word choice appropriacy, lack of flexibility → frequent simplifications/repetitions. Errors in spelling/word formation may be noticeable and cause difficulty.
4: Limited and inadequate/unrelated to task. Vocabulary basic, may be repetitive. Inappropriate lexical chunks. Word choice errors and/or spelling may impede meaning.
3: Inadequate resource. Possible over-dependence on input material or memorised language. Word choice/spelling very limited, errors predominate → severely impede meaning.

=== GRAMMATICAL RANGE & ACCURACY ===
9: Wide range of structures with full flexibility and control. Punctuation/grammar used appropriately throughout. Minor errors extremely rare.
8: Wide range of structures flexibly and accurately used. Majority of sentences error-free, punctuation well managed. Occasional non-systematic errors with minimal impact.
7: Variety of complex structures used with some flexibility and accuracy. Grammar/punctuation generally well controlled, error-free sentences frequent. Few errors persist but do not impede communication.
6: Mix of simple and complex sentence forms but flexibility limited. Complex structures not marked by same level of accuracy as simple ones. Errors in grammar/punctuation occur but rarely impede communication.
5: Range of structures limited and rather repetitive. Complex sentences attempted but tend to be faulty. Greatest accuracy on simple sentences. Grammatical errors frequent and cause difficulty. Punctuation may be faulty.
4: Very limited range of structures. Subordinate clauses rare, simple sentences predominate. Some structures accurate but grammatical errors frequent and may impede meaning. Punctuation often faulty or inadequate.
3: Sentence forms attempted but errors in grammar/punctuation predominate → prevents most meaning. Length may be insufficient.
`;

async function gradeEssay() {
  // Sync essay from textarea first
  const ea = document.getElementById('essay-area');
  if (ea) S.essay = ea.value;

  const words = wc(S.essay);
  const minW = S.taskType === '1' ? 150 : 230;
  if (words < 50)  { toast(`Avval esse yozing (hozir: ${words} so'z)`, 'err'); return; }
  if (words < minW) { toast(`Kamida ${minW} so'z yozing (hozir: ${words})`, 'err'); return; }
  setLoading(true, 'AI esseyingizni tahlil qilmoqda…');
  try {
    const et       = S.taskType === '2' ? getET(S.selEssayType) : null;
    const isTask1  = S.taskType === '1';
    const bandDesc = isTask1 ? BAND_DESC_T1 : BAND_DESC_T2;
    const taName   = isTask1 ? 'Task Achievement' : 'Task Response';

    // Task-type specific Task Achievement guidance
    const taFocus = isTask1
      ? `TASK ACHIEVEMENT CHECKLIST (Task 1 Academic):
- Is there a clear OVERVIEW paragraph (not just restating the question)?
- Are the KEY FEATURES selected and highlighted (not just a list of all data)?
- Is the data ACCURATELY described with specific figures?
- Are COMPARISONS made where relevant?
- Is there NO opinion or personal view added?`
      : `TASK RESPONSE CHECKLIST (Task 2 ${et?.label || ''}):
${S.selEssayType === 'opinion'    ? '- Is a clear personal opinion stated in the introduction AND maintained throughout?\n- Are BOTH sides mentioned even if one is favoured?\n- Is each body paragraph focused on ONE argument supporting the position?' : ''}
${S.selEssayType === 'discussion' ? '- Are BOTH views fairly discussed (not one-sided)?\n- Is the writer\'s own opinion given in the conclusion?\n- Is each view in a separate body paragraph?' : ''}
${S.selEssayType === 'problem'    ? '- Are specific PROBLEMS/CAUSES clearly identified?\n- Is a concrete SOLUTION proposed for each problem?\n- Are causes and solutions logically linked?' : ''}
${S.selEssayType === 'advdisadv'  ? '- Are BOTH advantages AND disadvantages covered with equal depth?\n- Does each body paragraph focus on one side only?\n- Are specific examples given for each point?' : ''}
${S.selEssayType === 'twopart'    ? '- Are BOTH questions answered directly and fully?\n- Does each body paragraph address one question?\n- Are both answers adequately developed?' : ''}`;

    const wordNote = `\nEssay word count: ${words} words. Assess only the quality of what is written — do not apply any word count penalty. If the essay is short, the Task ${isTask1?'Achievement':'Response'} score will naturally reflect limited coverage of key features/ideas, as per the descriptors.`;

    const systemPrompt = `You are a trained IELTS Writing examiner certified by the British Council and IDP. You grade strictly according to the official IELTS Band Descriptors (May 2023 edition). Your scores must be consistent with real IELTS exam standards — do not inflate scores. Most test-takers score between Band 4.5 and 7.0. A Band 8+ essay is truly exceptional. Return ONLY valid JSON, no other text.`;

    const userPrompt = `${bandDesc}

${taFocus}
${wordNote}

GRADING INSTRUCTIONS:
1. Read the essay carefully and identify EVIDENCE for each criterion.
2. Match the evidence against the band descriptors above — from top (9) downward until you find the BEST match.
3. A script must FULLY FIT the positive features of a band AND not exhibit the negative features (bolded in descriptors) of that band.
4. If a script sits between two bands, award the lower band unless it clearly meets the higher band's positive features.
5. Scores must be whole numbers (1-9). Overall = exact average of 4 scores, rounded to nearest 0.5.
6. Be STRICT. Most learners are Band 5-6. Only award 7+ if the essay genuinely meets those descriptors.
7. Feedback must cite SPECIFIC examples from the essay (actual phrases, sentences, or errors found).

TASK: IELTS Writing Task ${S.taskType}${et ? ` — ${et.label}` : ' — Academic'}
TOPIC: ${S.topic.topic}
${S.topic.dataDescription ? `CHART/DATA PROVIDED: ${S.topic.dataDescription}` : ''}
WORD COUNT: ${words}

ESSAY TO GRADE:
"""
${S.essay}
"""

Return this exact JSON (replace X with scores 1-9, write feedback in Uzbek language citing specific evidence from the essay):
{
  "ta":  {"score": X, "feedback": "3-4 gap. Aniq misol keltiring esseydan. Nima yaxshi/yomon qilinganini ayting."},
  "cc":  {"score": X, "feedback": "3-4 gap. Qaysi cohesive devices ishlatilgan/ishlatilmagan? Paragraflar to'g'rimi?"},
  "lr":  {"score": X, "feedback": "3-4 gap. Aniq so'z/iborani keltiring. Xato/kuchli so'z ishlatilishini misolda ko'rsating."},
  "gra": {"score": X, "feedback": "3-4 gap. Aniq grammatik xatolarni keltiring. Qaysi strukturalar yaxshi/yomon?"},
  "overall": X.X,
  "summary": "2-3 gap umumiy baho. Esse darajasini to'g'ri ifodalang.",
  "strengths": ["kuchli1 — aniq misol bilan", "kuchli2 — aniq misol bilan"],
  "improvements": ["1-ustuvor yaxshilash — aniq maslahat", "2-yaxshilash — aniq maslahat", "3-yaxshilash — aniq maslahat"]
}`;

    const raw = await callGroq(systemPrompt, userPrompt, 2500, 0.1);

    const res = JSON.parse(raw.replace(/```json|```/g, '').trim());
    res.overall = avg([res.ta.score, res.cc.score, res.lr.score, res.gra.score]);

    const sub = {
      id: uid(), userId: S.user.id, userName: S.user.name, userTelegram: S.user.telegram,
      taskType: S.taskType, essayType: S.selEssayType, topic: S.topic,
      essay: S.essay, wordCount: words, scores: res, timestamp: new Date().toISOString(),
    };
    await DB.addSub(sub);

    // Stop exam timer
    if (S._examInterval) clearInterval(S._examInterval);
    S.examRunning = false;

    // ── Exam mode: after Task 1 → go to Task 2 ──
    if (S.practiceMode === 'exam' && S.examPhase === 1) {
      S.examTask1Result = res;
      S.examPhase = 2;
      S.result = res;
      setLoading(false);
      S.view = 'exam-task1-result';
      render();
      return;
    }

    S.result = res;
    setLoading(false);
    S.view = 'result';
    render();
  } catch(e) {
    setLoading(false);
    if (e.message === 'API_KEY_MISSING') { S.view = 'api-setup'; render(); }
    else toast('Baholashda xatolik: ' + e.message, 'err', 5000);
  }
}

    ${mySubs.length ? `<div class="card" style="margin-bottom:16px">
      <div class="flex-between" style="margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">Band ${Math.floor(lastBand)} → Band ${Math.min(9,Math.floor(lastBand)+1)}</span>

      </div>
      <div class="progress-bar" style="height:6px">
        <div class="progress-fill" style="width:${progressToNext}%;background:var(--green)"></div>
      </div>
      <p class="muted" style="margin-top:7px;font-size:11px">Keyingi bandga yetish uchun ko'proq yozing va o'rganib boring 📚</p>
    </div>` : ''}

    <!-- Badges -->
    ${badges.length ? `<div class="card" style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;letter-spacing:.5px">🏅 YUTUQLAR</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${badges.map(b => `<span style="background:var(--amber2);color:var(--amber);border:1px solid rgba(245,158,11,.25);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px">${b.icon} ${b.label}</span>`).join('')}
      </div>
    </div>` : ''}

    <!-- CTA card -->
    <div class="card card-accent" style="margin-bottom:20px">
      <span class="tag" style="margin-bottom:10px">IELTS Band 1–9</span>
      <h3 class="h3" style="margin-bottom:8px;font-size:17px">AI bilan yozing, baholatib oling</h3>
      <p style="color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:16px">
        5 ta esse turi, 8 ta kategoriya. TA, CC, LR, GRA da band score oling.
      </p>
      <button class="btn btn-primary btn-block" data-action="nav" data-val="generate">Boshlash →</button>
    </div>

    <!-- Recent submissions -->
    ${recent.length ? `
    <div class="flex-between" style="margin-bottom:12px">
      <h3 class="h3">So'nggi urinishlar</h3>
      <button class="btn-ghost" data-action="nav" data-val="history">Hammasi</button>
    </div>
    <div class="stack">
      ${recent.map(sub => {
        const et = sub.essayType ? getET(sub.essayType) : null;
        return `<div class="sub-item flex-between" data-action="open-sub" data-val="${sub.id}">
          <div style="min-width:0">
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">

              ${et ? `<span class="tag" style="background:${et.color}18;color:${et.color};border-color:${et.color}33">${et.icon} ${et.label}</span>` : ''}
            </div>
            <p class="muted" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fmtDate(sub.timestamp)} · ${sub.wordCount} so'z</p>
          </div>
          ${getBandBadge(sub.scores.overall)}
        </div>`;
      }).join('')}
    </div>` : `
    <div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:12px">✍️</div>
      <p class="muted" style="margin-bottom:16px">Hali urinish yo'q. Birinchi esseyni yozing!</p>
      <button class="btn btn-primary" data-action="nav" data-val="generate">Boshlash →</button>
    </div>`}
  </div>${studentBottomNav()}`;
}

// ── GENERATE ──────────────────────────────

          style="--accent:${l.color};--accent-rgb:${l.rgb}"

          <div style="display:flex;align-items:center;gap:10px">

// ── WRITE ──────────────────────────────
function viewWrite() {
  const t = S.topic; if (!t) return viewGenerate();
  const et    = S.taskType === '2' ? getET(S.selEssayType) : null;
  const words = wc(S.essay);
  const minW  = S.taskType === '1' ? 150 : 250;
  const pct   = Math.min(100, Math.round(words / minW * 100));
  const wcCol = words >= minW ? 'var(--green)' : 'var(--amber)';

  // Timer display
  let timerHtml = '';
  if (S.examRunning || S.practiceMode === 'exam') {
    const sec = S.examTimer;
    const mm = String(Math.floor(sec / 60)).padStart(2, '0');
    const ss = String(sec % 60).padStart(2, '0');
    const timerCls = sec < 120 ? 'danger' : sec < 300 ? 'warning' : '';
    const totalSec = S.examPhase === 1 ? 20*60 : 40*60;
    const usedPct = Math.max(0, Math.min(100, (1 - sec/totalSec)*100));
    timerHtml = `
    <div class="exam-phase-bar" style="margin-bottom:10px">
      <div class="exam-phase-seg${S.examPhase===1?' active':' done'}">Task 1 · 20 daq</div>
      <div class="exam-phase-seg${S.examPhase===2?' active':S.examPhase>2?' done':''}">Task 2 · 40 daq</div>
    </div>
    <div class="exam-timer ${timerCls}" style="margin-bottom:14px">
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--text3);margin-bottom:2px">QOLGAN VAQT — ${S.examPhase===1?'TASK 1':'TASK 2'}</div>
        <div class="timer-display">${mm}:${ss}</div>
      </div>
      <div style="width:80px">
        <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${usedPct}%;background:${timerCls==='danger'?'#EF4444':timerCls==='warning'?'var(--amber)':'var(--red)'};border-radius:3px;transition:width 1s linear"></div>
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px;text-align:right">${Math.round(usedPct)}% ishlatildi</div>
      </div>
    </div>`;
  }

  return `${studentTopBar()}<div class="page">
    ${timerHtml}
    <!-- Topic card -->
    <div class="card card-accent" style="margin-bottom:14px">
      <div class="flex-between" style="margin-bottom:10px;align-items:flex-start">
        <div style="display:flex;gap:6px;flex-wrap:wrap;flex:1">
          <span class="tag">Task ${S.taskType}</span>
          ${et ? `<span class="tag" style="background:${et.color}18;color:${et.color};border-color:${et.color}33">${et.icon} ${et.label}</span>` : ''}
          <span class="tag-gray">${t.category || ''}</span>
        </div>
        ${S.practiceMode !== 'exam' ? `<button class="btn-icon" data-action="nav" data-val="generate" title="Yangi mavzu" style="flex-shrink:0">${IC.refresh}</button>` : ''}
      </div>
      <p style="font-size:14px;line-height:1.8;color:var(--text);margin-bottom:${t.chartData||t.dataDescription?'10px':'0'}">${esc(t.topic)}</p>
      ${t.chartData ? `<div style="margin-bottom:10px;border-radius:10px;overflow:hidden">${renderChartSVG(t)}</div>` : ''}
      ${t.dataDescription && !t.chartData ? `<div style="background:var(--bg3);border-radius:9px;padding:10px 13px;margin-bottom:10px">
        <span class="muted">${IC.chart}&nbsp;</span><span style="font-size:13px;color:var(--text2)">${esc(t.dataDescription)}</span>
      </div>` : ''}
      ${t.tip_uz ? `<div class="struct-tip" style="${et?'--accent:'+et.color:''}">
        <span style="font-size:12px;font-weight:700;color:${et?et.color:'var(--red)'};margin-right:6px">💡</span>
        <span style="font-size:12px;color:var(--text2)">${esc(t.tip_uz)}</span>
      </div>` : ''}
    </div>

    <!-- Word count -->
    <div class="flex-between" style="margin-bottom:8px">
      <label class="label" style="margin:0">Esseyingiz</label>
      <span style="font-size:12px;font-weight:700;padding:3px 11px;border-radius:20px;
        background:${words>=minW?'var(--green2)':'rgba(245,158,11,.12)'};
        color:${wcCol};border:1px solid ${words>=minW?'rgba(34,197,94,.25)':'rgba(245,158,11,.25)'}">
        <span id="wc-num">${words}</span> / ${minW}+
      </span>
    </div>
    <div class="progress-bar" style="margin-bottom:12px">
      <div id="wc-bar" class="progress-fill" style="width:${pct}%;background:${wcCol}"></div>
    </div>

    <!-- Essay textarea -->
    <textarea class="inp" id="essay-area" data-field="essay"
      placeholder="Bu yerga esseyingizni yozing…&#10;&#10;Minimal ${minW} ta so'z talab etiladi."
      rows="14" style="margin-bottom:14px"></textarea>

    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" style="flex:1" data-action="grade" ${S.loading?'disabled':''}>
        ${S.loading ? `<div class="spin" style="width:18px;height:18px;border-width:2px;margin:0"></div>&nbsp;Baholanmoqda…` : '🎯&nbsp;Baholatish →'}
      </button>
      <button class="btn btn-secondary" data-action="clear-essay">${IC.refresh}</button>
    </div>

    ${S.loading ? `<div style="text-align:center;padding:28px"><p class="muted">${esc(S.loadingTxt)}</p></div>` : ''}
  </div>${studentBottomNav()}`;
}

// ── RESULT ──────────────────────────────
function viewResult() {
  const r = S.result; if (!r) return '';
  const et = S.taskType === '2' ? getET(S.selEssayType) : null;
  const taLabel = S.taskType === '1' ? 'Task Achievement' : 'Task Response';
  const criteria = [[taLabel,'ta'],['Coherence & Cohesion','cc'],['Lexical Resource','lr'],['Grammatical Range','gra']];
  return `${studentTopBar()}<div class="page">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:48px;margin-bottom:10px">${r.overall>=7?'🏆':r.overall>=5?'📊':'📝'}</div>
      <h1 class="h2" style="margin-bottom:10px">Natijangiz tayyor!</h1>
      ${getBandBadge(r.overall)}
    </div>

    <!-- Score rings -->
    <div class="card" style="margin-bottom:14px">
      <h3 class="h3" style="text-align:center;margin-bottom:14px">Mezonlar bo'yicha</h3>
      <div class="score-rings">
        ${getScoreRing(r.ta.score, taLabel)}

            <p style="font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px">${esc((sub.topic?.topic || '').slice(0, 90))}…</p>

          <div style="flex-shrink:0;text-align:right">

              ${['ta','cc','lr','gra'].map(k => `<span style="font-size:10px;color:${bandColor(sub.scores[k].score)};background:${bandColor(sub.scores[k].score)}15;padding:2px 6px;border-radius:8px;font-weight:700">${k.toUpperCase()} ${sub.scores[k].score}</span>`).join('')}
            </div>
          </div>
        </div>
      </div>`;

function renderTeacherStudents(allSubs) {
  const subMap = {};
  for (const sub of allSubs) {
    if (!subMap[sub.userId]) subMap[sub.userId] = [];
    subMap[sub.userId].push(sub);
  }
  const allStudentUsers = S.users.filter(u => u.role !== 'teacher');
  const students = allStudentUsers.map(u => ({
    userId: u.id, name: u.name, telegram: u.telegram, subs: subMap[u.id] || [],
  })).sort((a, b) => b.subs.length - a.subs.length);

  if (students.length === 0) {
    return '<div class="card" style="text-align:center;padding:60px"><div style="font-size:48px;margin-bottom:12px">📭</div><p class="muted">Hozircha ro\'yxatdan o\'tgan o\'quvchi yo\'q</p></div>';
  }

  return '<div class="stack">' + students.map(st => renderStudentCard(st)).join('') + '</div>';
}

function renderStudentCard(st) {
  const hasSubs = st.subs.length > 0;
  const avgTA  = hasSubs ? avg(st.subs.map(s => s.scores.ta?.score  || 0)) : 0;
  const avgCC  = hasSubs ? avg(st.subs.map(s => s.scores.cc?.score  || 0)) : 0;
  const avgLR  = hasSubs ? avg(st.subs.map(s => s.scores.lr?.score  || 0)) : 0;
  const avgGRA = hasSubs ? avg(st.subs.map(s => s.scores.gra?.score || 0)) : 0;
  const avgAll = hasSubs ? avg(st.subs.map(s => s.scores.overall || 0)) : 0;
  const best   = hasSubs ? Math.max(...st.subs.map(s => s.scores.overall || 0)) : 0;
  const criteriaAvgs = [['Task/Topic','ta',avgTA],['Coherence','cc',avgCC],['Lexical','lr',avgLR],['Grammar','gra',avgGRA]];
  const weakest = hasSubs ? [...criteriaAvgs].sort((a,b) => a[2]-b[2])[0] : null;
  const initials = st.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  const isOpen = S.teacherStudentId === st.userId;
  const trend = hasSubs && st.subs.length >= 2
    ? (st.subs[0].scores.overall - st.subs[st.subs.length-1].scores.overall) : 0;

  let trendHtml;
  if (!hasSubs) trendHtml = '<span style="color:var(--text3);font-size:11px">📭 Hali urinish yo\'q</span>';

  else if (trend < -0.2) trendHtml = '<span style="color:#ef4444;font-size:11px">▼ ' + trend.toFixed(1) + '</span>';
  else trendHtml = '<span style="color:var(--text3);font-size:11px">→ Barqaror</span>';

  let rightHtml;
  if (hasSubs) {
    rightHtml = '<div style="font-size:22px;font-weight:800;color:' + bandColor(avgAll) + '">' + avgAll.toFixed(1) + '</div>'
      + '<div style="font-size:10px;color:var(--text3)">o\'rtacha band</div>'
      + '<div style="font-size:11px;color:var(--amber);margin-top:1px">🏆 Eng yaxshi: ' + best + '</div>';
  } else {
    rightHtml = '<div style="font-size:12px;color:var(--text3);padding:6px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)">Faol emas</div>';
  }

  let expandedHtml = '';
  if (isOpen) {
    if (!hasSubs) {
      expandedHtml = '<div style="border-top:1px solid var(--border);background:var(--bg2)">'
        + '<div style="padding:28px 20px;text-align:center">'
        + '<div style="font-size:40px;margin-bottom:10px">📭</div>'
        + '<p style="font-weight:700;font-size:14px;margin-bottom:6px">' + esc(st.name) + ' hali esse yozmagan</p>'
        + '<p class="muted" style="font-size:13px">@' + esc(st.telegram) + ' ro\'yxatdan o\'tgan, lekin hali birorta urinish yo\'q</p>'
        + '</div></div>';
    } else {
      // Criteria grid
      let criteriaGrid = criteriaAvgs.map(function(item) {
        const lbl = item[0], key = item[1], val = item[2];
        const isWeak = weakest && key === weakest[1];
        return '<div style="background:' + (isWeak?'rgba(239,68,68,.08)':'var(--bg3)') + ';border-radius:10px;padding:10px 6px;text-align:center;border:1.5px solid ' + (isWeak?'rgba(239,68,68,.35)':'var(--border)') + '">'
          + '<div style="font-size:20px;font-weight:800;color:' + bandColor(val) + '">' + val.toFixed(1) + '</div>'
          + '<div style="font-size:10px;color:var(--text3);margin-top:3px;font-weight:600">' + key.toUpperCase() + '</div>'
          + '<div style="font-size:9px;color:var(--text3);margin-top:1px">' + lbl + '</div>'
          + (isWeak ? '<div style="margin-top:4px;font-size:9px;background:rgba(239,68,68,.15);color:#ef4444;padding:2px 6px;border-radius:6px;font-weight:700">⚠ ZAIF</div>' : '')
          + '</div>';
      }).join('');

      let progressBars = criteriaAvgs.map(function(item) {
        const lbl = item[0], key = item[1], val = item[2];
        return '<div style="margin-bottom:10px">'
          + '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
          + '<span style="font-size:12px;color:var(--text2)">' + lbl + '</span>'
          + '<span style="font-size:13px;font-weight:700;color:' + bandColor(val) + '">' + val.toFixed(1) + ' / 9</span>'
          + '</div><div class="progress-bar" style="height:6px">'
          + '<div class="progress-fill" style="width:' + (val/9*100).toFixed(0) + '%;background:' + bandColor(val) + '"></div>'
          + '</div></div>';
      }).join('');

      let subsHtml = st.subs.map(function(sub, idx) {
        return renderStudentSubRow(sub, st.subs.length - idx);
      }).join('');

      expandedHtml = '<div style="border-top:1px solid var(--border);background:var(--bg2)">'
        + '<div style="padding:14px 16px;border-bottom:1px solid var(--border)">'
        + '<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:10px;letter-spacing:.6px">📊 MEZONLAR BO\'YICHA O\'RTACHA BALL</div>'
        + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">' + criteriaGrid + '</div>'
        + (weakest ? '<div class="alert alert-warn" style="font-size:12px;padding:9px 13px">⚠️ Eng zaif mezon: <b>' + weakest[0] + '</b> (o\'rtacha ' + weakest[2].toFixed(1) + ') — shu sohaga e\'tibor qaratish kerak</div>' : '')

        + '<div style="padding:14px 16px;border-bottom:1px solid var(--border)">'
        + '<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:10px;letter-spacing:.6px">📈 RIVOJLANISH GRAFIGI</div>'

        + '<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:10px;letter-spacing:.6px">📝 BARCHA URINISHLAR (' + st.subs.length + ' ta)</div>'

  return '<div class="card" style="padding:0;overflow:hidden;border-color:' + (isOpen?'var(--red3)':'var(--border)') + '">'

}

function renderStudentSubRow(sub, num) {
  const et = sub.essayType ? getET(sub.essayType) : null;
  const isSubOpen = S.teacherStudentSubId === sub.id;
  const timeStr = new Date(sub.timestamp).toLocaleString('uz-UZ',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const subScores = [sub.scores.ta?.score||0, sub.scores.cc?.score||0, sub.scores.lr?.score||0, sub.scores.gra?.score||0];
  const minScore = Math.min(...subScores);
  const weakKeys = [['ta','Task/Topic'],['cc','Coherence'],['lr','Lexical'],['gra','Grammar']];
  const subWeakest = weakKeys[subScores.indexOf(minScore)];

  let etTag = et ? '<span class="tag" style="background:' + et.color + '18;color:' + et.color + ';border-color:' + et.color + '33;font-size:10px;padding:2px 8px">' + et.icon + ' ' + et.label + '</span>' : '';
  let editedTag = sub.scores.teacherEdited ? '<span style="font-size:10px;background:var(--amber2);color:var(--amber);padding:2px 7px;border-radius:8px;border:1px solid rgba(245,158,11,.25);font-weight:600">✏️ Tahrirlangan</span>' : '';
  let scoreChips = ['ta','cc','lr','gra'].map(function(k) {
    return '<span style="font-size:9px;color:' + bandColor(sub.scores[k]?.score||0) + ';background:' + bandColor(sub.scores[k]?.score||0) + '18;padding:2px 5px;border-radius:6px;font-weight:700">' + k.toUpperCase() + ' ' + (sub.scores[k]?.score||0) + '</span>';
  }).join('');

  let detailHtml = '';
  if (isSubOpen) {
    let criteriaFeedback = [
      [sub.taskType==='1'?'Task Achievement':'Task Response', 'ta', sub.scores.ta],
      ['Coherence & Cohesion', 'cc', sub.scores.cc],
      ['Lexical Resource', 'lr', sub.scores.lr],
      ['Grammatical Range & Accuracy', 'gra', sub.scores.gra],
    ].map(function(arr) {
      const lbl = arr[0], k = arr[1], sc = arr[2];
      return '<div style="margin-bottom:9px;border-radius:9px;overflow:hidden;border:1px solid var(--border)">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:' + bandColor(sc?.score||0) + '12;border-bottom:1px solid ' + bandColor(sc?.score||0) + '30">'
        + '<span style="font-size:12px;font-weight:700;color:var(--text)">' + lbl + '</span>'
        + '<span style="font-size:16px;font-weight:800;color:' + bandColor(sc?.score||0) + '">Band ' + (sc?.score||0) + '</span>'
        + '</div><div style="padding:10px 12px;background:var(--bg3)">'
        + '<p style="font-size:12px;color:var(--text2);line-height:1.65">' + esc(sc?.feedback || '—') + '</p>'
        + '</div></div>';
    }).join('');

    detailHtml = '<div style="border-top:1px solid var(--border);padding:13px;background:var(--bg4)">'
      + '<div style="background:var(--bg3);border-radius:8px;padding:9px 11px;margin-bottom:12px;border-left:3px solid var(--blue)">'
      + '<div style="font-size:10px;font-weight:700;color:var(--blue);margin-bottom:4px;letter-spacing:.4px">MAVZU</div>'
      + '<p style="font-size:12px;color:var(--text2);line-height:1.6">' + esc((sub.topic?.topic || '').slice(0,200)) + (sub.topic?.topic?.length > 200 ? '…' : '') + '</p>'
      + '</div>'
      + '<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:9px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px">'
      + '<span style="font-size:18px">⚠️</span>'
      + '<span style="font-size:12px;color:#ef4444">Eng zaif mezon: <b>' + (subWeakest ? subWeakest[1] : '') + '</b> (Band ' + minScore + ')</span>'
      + '</div>'
      + '<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px;letter-spacing:.5px">🔍 XATOLAR TAHLILI</div>'
      + criteriaFeedback
      + (sub.scores.summary ? '<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:9px;padding:10px 12px;margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:var(--green);margin-bottom:5px">UMUMIY BAHO</div><p style="font-size:12px;color:var(--text2);line-height:1.6">' + esc(sub.scores.summary) + '</p></div>' : '')
      + (sub.scores.teacherNote ? '<div style="background:var(--amber2);border:1px solid rgba(245,158,11,.25);border-radius:9px;padding:10px 12px;margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:var(--amber);margin-bottom:5px">👨‍🏫 USTOZ IZOHI</div><p style="font-size:12px;color:var(--text2);line-height:1.6">' + esc(sub.scores.teacherNote) + '</p></div>' : '')
      + '<button class="btn btn-secondary" style="width:100%;font-size:12px;padding:10px;margin-top:4px" data-action="open-sub-teacher" data-val="' + sub.id + '">📄 To\'liq ko\'rish va tahrirlash →</button>'
      + '</div>';
  }

  return '<div style="background:var(--bg3);border-radius:10px;border:1px solid ' + (isSubOpen?'var(--red3)':'var(--border)') + ';overflow:hidden">'
    + '<div style="padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:10px" data-action="toggle-student-sub" data-val="' + sub.id + '">'
    + '<div style="background:var(--bg4);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--text3);flex-shrink:0">' + num + '</div>'
    + '<div style="flex:1;min-width:0">'
    + '<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:3px">'
    + '<span class="tag" style="font-size:10px;padding:2px 8px">Task ' + sub.taskType + '</span>'
    + etTag + editedTag
    + '</div>'
    + '<div style="font-size:11px;color:var(--text3)">' + timeStr + ' · ' + sub.wordCount + ' so\'z</div>'
    + '</div>'
    + '<div style="text-align:right;flex-shrink:0">'
    + '<div style="font-size:16px;font-weight:800;color:' + bandColor(sub.scores.overall) + '">Band ' + sub.scores.overall + '</div>'
    + '<div style="display:flex;gap:3px;justify-content:flex-end;margin-top:4px;flex-wrap:wrap">' + scoreChips + '</div>'
    + '</div>'
    + '<div style="color:var(--text3);font-size:18px;transition:transform .2s;flex-shrink:0;' + (isSubOpen?'transform:rotate(180deg)':'') + '">⌄</div>'
    + '</div>'
    + detailHtml
    + '</div>';
}

/* ══════════════════════════════════════════
