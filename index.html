function drawBarChart(d) {
  const W=480,H=280,ml=52,mr=16,mt=28,mb=56;
  const cW=W-ml-mr, cH=H-mt-mb;
  const allVals=d.series.flatMap(s=>s.data);
  const maxV=Math.ceil(Math.max(...allVals)*1.1/10)*10||10;
  const grps=d.labels.length, sN=d.series.length;
  const grpW=cW/grps, barW=Math.min(26,(grpW*0.82)/sN);
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:280px;display:block">
    <style>text{font-family:'DM Sans',sans-serif;fill:#B0B0A8;font-size:10px}</style>
    <rect width="${W}" height="${H}" fill="#131313" rx="10"/>`;
  for(let i=0;i<=5;i++){
    const v=(maxV*i/5), y=mt+cH-(cH*i/5);
    svg+=`<line x1="${ml}" y1="${y.toFixed(1)}" x2="${W-mr}" y2="${y.toFixed(1)}" stroke="#262626" stroke-width="${i===0?1.5:.6}"/>`;
    svg+=`<text x="${ml-5}" y="${(y+3.5).toFixed(1)}" text-anchor="end">${v%1===0?v:v.toFixed(1)}</text>`;
  }
  d.labels.forEach((lbl,gi)=>{
    const gx=ml+gi*grpW+grpW/2, totalW=barW*sN+(sN-1)*2;
    const sx=gx-totalW/2;
    d.series.forEach((s,si)=>{
      const val=s.data[gi]||0, bH=(val/maxV)*cH;
      const bx=sx+si*(barW+2), by=mt+cH-bH;
      svg+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${barW}" height="${Math.max(1,bH).toFixed(1)}" fill="${s.color}" rx="3" opacity=".88"/>`;
    });
    const shortLbl=lbl.length>10?lbl.slice(0,9)+'…':lbl;
    svg+=`<text x="${gx.toFixed(1)}" y="${mt+cH+17}" text-anchor="middle">${shortLbl}</text>`;
  });
  if(sN>1){let lx=ml; d.series.forEach(s=>{svg+=`<rect x="${lx}" y="${H-18}" width="10" height="10" fill="${s.color}" rx="2"/>`;svg+=`<text x="${lx+14}" y="${H-9}" fill="#B0B0A8">${s.name}</text>`;lx+=s.name.length*6.5+22;});}
  if(d.title)svg+=`<text x="${W/2}" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#E0E0DC">${d.title}</text>`;
  return svg+'</svg>';
}

function drawLineChart(d) {
  const W=480,H=280,ml=52,mr=16,mt=28,mb=56;
  const cW=W-ml-mr, cH=H-mt-mb;
  const allVals=d.series.flatMap(s=>s.data);
  const minV=Math.min(...allVals), maxV=Math.max(...allVals);
  const range=maxV-minV||1, pad=range*0.12;
  const lo=minV-pad, hi=maxV+pad, span=hi-lo;
  const pts=d.labels.length;
  const xP=i=>ml+(i/(pts-1||1))*cW;
  const yP=v=>mt+cH-((v-lo)/span)*cH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:280px;display:block">
    <style>text{font-family:'DM Sans',sans-serif;fill:#B0B0A8;font-size:10px}</style>
    <rect width="${W}" height="${H}" fill="#131313" rx="10"/>`;
  for(let i=0;i<=5;i++){
    const v=lo+span*i/5, y=mt+cH-(cH*i/5);
    svg+=`<line x1="${ml}" y1="${y.toFixed(1)}" x2="${W-mr}" y2="${y.toFixed(1)}" stroke="#262626" stroke-width="${i===0?1.5:.6}"/>`;
    svg+=`<text x="${ml-5}" y="${(y+3.5).toFixed(1)}" text-anchor="end">${v%1===0?Math.round(v):v.toFixed(1)}</text>`;
  }
  d.series.forEach(s=>{
    const pts_str=s.data.map((v,i)=>`${xP(i).toFixed(1)},${yP(v).toFixed(1)}`).join(' ');
    svg+=`<polyline points="${pts_str}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    s.data.forEach((v,i)=>{svg+=`<circle cx="${xP(i).toFixed(1)}" cy="${yP(v).toFixed(1)}" r="4" fill="${s.color}" stroke="#131313" stroke-width="2"/>`;});
  });
  d.labels.forEach((lbl,i)=>{const shortLbl=lbl.length>7?lbl.slice(0,6)+'…':lbl;svg+=`<text x="${xP(i).toFixed(1)}" y="${mt+cH+17}" text-anchor="middle">${shortLbl}</text>`;});
  if(d.series.length>1){let lx=ml;d.series.forEach(s=>{svg+=`<line x1="${lx}" y1="${H-12}" x2="${lx+14}" y2="${H-12}" stroke="${s.color}" stroke-width="2.5"/>`;svg+=`<text x="${lx+18}" y="${H-8}" fill="#B0B0A8">${s.name}</text>`;lx+=s.name.length*6.5+28;});}
  if(d.title)svg+=`<text x="${W/2}" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#E0E0DC">${d.title}</text>`;
  return svg+'</svg>';
}

function drawPieChart(d) {
  const W=480,H=260,cx=160,cy=130,r=110,ir=58;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:260px;display:block">
    <style>text{font-family:'DM Sans',sans-serif;fill:#B0B0A8;font-size:11px}</style>
    <rect width="${W}" height="${H}" fill="#131313" rx="10"/>`;
  const total=d.segments.reduce((a,s)=>a+s.value,0);
  let angle=-Math.PI/2;
  d.segments.forEach(seg=>{
    const sweep=(seg.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
    const xi1=cx+ir*Math.cos(angle),yi1=cy+ir*Math.sin(angle);
    const xi2=cx+ir*Math.cos(angle+sweep),yi2=cy+ir*Math.sin(angle+sweep);
    const lg=sweep>Math.PI?1:0;
    svg+=`<path d="M${xi1.toFixed(1)},${yi1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ir},${ir} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)}" fill="${seg.color}" opacity=".9"/>`;
    if(seg.value/total>0.07){const ma=angle+sweep/2;svg+=`<text x="${(cx+(r*0.72)*Math.cos(ma)).toFixed(1)}" y="${(cy+(r*0.72)*Math.sin(ma)+4).toFixed(1)}" text-anchor="middle" font-weight="700" fill="white" font-size="11">${seg.value}%</text>`;}
    angle+=sweep;
  });
  let ly=30;
  d.segments.forEach(seg=>{
    if(ly>H-14)return;
    svg+=`<rect x="292" y="${ly-9}" width="12" height="12" fill="${seg.color}" rx="2"/>`;
    const lbl=seg.label.length>20?seg.label.slice(0,19)+'…':seg.label;
    svg+=`<text x="310" y="${ly+1}">${lbl}</text>`;
    ly+=20;
  });
  if(d.title)svg+=`<text x="${cx}" y="${H-8}" text-anchor="middle" font-size="10" fill="#6E6E66">${d.title}</text>`;
  return svg+'</svg>';
}

function drawTableChart(d) {
  const W=480, cols=d.headers.length, colW=(W-32)/cols;
  const rowH=34, headerH=38;
  const H=headerH+d.rows.length*rowH+20;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:${H}px;display:block">
    <style>text{font-family:'DM Sans',sans-serif;fill:#B0B0A8;font-size:11px}</style>
    <rect width="${W}" height="${H}" fill="#131313" rx="10"/>
    <rect x="16" y="10" width="${W-32}" height="${headerH}" fill="#1E1E1E" rx="8"/>`;
  d.headers.forEach((h,i)=>{svg+=`<text x="${(16+i*colW+colW/2).toFixed(1)}" y="${10+headerH/2+4}" text-anchor="middle" font-weight="700" fill="#F0F0EC" font-size="11">${h}</text>`;});
  d.rows.forEach((row,ri)=>{
    const ry=headerH+10+ri*rowH;
    if(ri%2===0)svg+=`<rect x="16" y="${ry}" width="${W-32}" height="${rowH}" fill="#181818" rx="4"/>`;
    row.forEach((cell,ci)=>{
      const isFirst=ci===0, col=isFirst?'#E0E0DC':'#B0B0A8';
      const c=String(cell); const shortC=c.length>16?c.slice(0,15)+'…':c;
      svg+=`<text x="${(16+ci*colW+colW/2).toFixed(1)}" y="${(ry+rowH/2+4).toFixed(1)}" text-anchor="middle" fill="${col}" font-weight="${isFirst?'600':'400'}">${shortC}</text>`;
    });
  });
  return svg+'</svg>';
}

function drawProcessChart(d) {
  const steps=d.steps, W=480, boxH=48, gap=22, ml=14;
  const H=steps.length*(boxH+gap)+16;
  const cols=['#C8102E','#e06030','#d4880a','#15803d','#0891B2','#7C3AED','#be185d'];
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:${Math.min(H,500)}px;display:block">
    <style>text{font-family:'DM Sans',sans-serif;fill:#B0B0A8;font-size:12px}</style>
    <rect width="${W}" height="${H}" fill="#131313" rx="10"/>`;
  steps.forEach((step,i)=>{
    const y=8+i*(boxH+gap), col=cols[i%cols.length];
    svg+=`<rect x="${ml}" y="${y}" width="${W-ml*2}" height="${boxH}" fill="${col}1A" stroke="${col}55" stroke-width="1.5" rx="10"/>`;
    svg+=`<circle cx="${ml+22}" cy="${y+boxH/2}" r="13" fill="${col}"/>`;
    svg+=`<text x="${ml+22}" y="${y+boxH/2+5}" text-anchor="middle" font-size="12" font-weight="800" fill="white">${i+1}</text>`;
    const max=54, lines=[];
    let rem=step;
    while(rem.length>max){let idx=rem.lastIndexOf(' ',max);if(idx<0)idx=max;lines.push(rem.slice(0,idx));rem=rem.slice(idx+1);}
    lines.push(rem);
    lines.forEach((ln,li)=>{svg+=`<text x="${ml+44}" y="${y+boxH/2-(lines.length-1)*7+li*15+4}" fill="#E0E0DC">${ln}</text>`;});
    if(i<steps.length-1){
      svg+=`<line x1="${W/2}" y1="${y+boxH+2}" x2="${W/2}" y2="${y+boxH+gap-2}" stroke="${col}66" stroke-width="2" stroke-dasharray="3,3"/>`;
      svg+=`<polygon points="${W/2},${y+boxH+gap} ${W/2-5},${y+boxH+gap-7} ${W/2+5},${y+boxH+gap-7}" fill="${col}66"/>`;
    }
  });
  return svg+'</svg>';
}

function drawMapChart(d) {
  const W=480, H=Math.max(260, 60+Math.max((d.before.items||[]).length,(d.after.items||[]).length)*32);
  const colW=(W-48)/2;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:${H}px;display:block">
    <style>text{font-family:'DM Sans',sans-serif;fill:#B0B0A8;font-size:11px}</style>
    <rect width="${W}" height="${H}" fill="#131313" rx="10"/>
    <rect x="14" y="12" width="${colW}" height="${H-24}" fill="#1A1A1A" rx="10" stroke="#262626"/>
    <rect x="14" y="12" width="${colW}" height="34" fill="#C8102E22" rx="10"/>
    <text x="${14+colW/2}" y="33" text-anchor="middle" font-size="13" font-weight="700" fill="#F0F0EC">${d.before.year}</text>`;
  (d.before.items||[]).forEach((item,i)=>{
    const y=60+i*30;if(y>H-16)return;
    svg+=`<circle cx="28" cy="${y}" r="4" fill="#C8102E"/>`;
    const lbl=item.length>26?item.slice(0,25)+'…':item;
    svg+=`<text x="38" y="${y+4}">${lbl}</text>`;
  });
  const ax=14+colW+20;
  svg+=`<rect x="${ax}" y="12" width="${colW}" height="${H-24}" fill="#1A1A1A" rx="10" stroke="#262626"/>
    <rect x="${ax}" y="12" width="${colW}" height="34" fill="#22C55E22" rx="10"/>
    <text x="${ax+colW/2}" y="33" text-anchor="middle" font-size="13" font-weight="700" fill="#F0F0EC">${d.after.year}</text>`;
  (d.after.items||[]).forEach((item,i)=>{
    const y=60+i*30;if(y>H-16)return;
    svg+=`<circle cx="${ax+14}" cy="${y}" r="4" fill="#22C55E"/>`;
    const lbl=item.length>26?item.slice(0,25)+'…':item;
    svg+=`<text x="${ax+24}" y="${y+4}">${lbl}</text>`;
  });
  svg+=`<text x="${W/2}" y="${H/2}" text-anchor="middle" font-size="18" fill="#6E6E66">→</text>`;
  return svg+'</svg>';
}

function renderChartSVG(topic) {
  if(!topic||!topic.chartData) return '';
  const d=topic.chartData;
  try {
    switch(d.type) {
      case 'bar':     return drawBarChart(d);
      case 'line':    return drawLineChart(d);
      case 'pie':     return drawPieChart(d);
      case 'table':   return drawTableChart(d);
      case 'process': return drawProcessChart(d);
      case 'map':     return drawMapChart(d);
      case 'mixed':
        return (d.charts||[]).map(c=>{
          switch(c.type){
            case 'bar':  return drawBarChart(c);
            case 'line': return drawLineChart(c);
            case 'pie':  return drawPieChart(c);
            default:     return '';
          }
        }).join('<div style="height:10px"></div>');
      default: return '';
    }
  } catch(e){ console.warn('Chart render error:',e); return ''; }
}

/* ══════════════════════════════════════════
   🎨 MAIN RENDER
══════════════════════════════════════════ */
function render() {
  const app = document.getElementById('app');
  if (!app) return;

  // 🔐 Teacher view guard — o'quvchi teacher sahifalariga kira olmaydi
  const teacherViews = ['t-home', 't-settings', 'sub-detail-teacher'];
  if (teacherViews.includes(S.view) && S.user?.role !== 'teacher') {
    S.view = S.user ? 's-home' : 'landing';
  }

  let html = '';
  switch(S.view) {
    case 'loading':           html = viewLoading(); break;
    case 'landing':           html = viewLanding(); break;
    case 'api-setup':         html = viewApiSetup(); break;
    case 'auth':              html = viewAuth(); break;
    case 's-home':            html = viewStudentHome(); break;
    case 'generate':          html = viewGenerate(); break;
    case 'write':             html = viewWrite(); break;
    case 'result':            html = viewResult(); break;
    case 'exam-task1-result': html = viewExamTask1Result(); break;
    case 'history':           html = viewHistory(); break;
    case 'profile':           html = viewProfile(); break;
    case 'sub-detail':        html = viewSubDetail(false); break;
    case 'sub-detail-teacher':html = viewSubDetail(true); break;
    case 't-home':            html = viewTeacherHome(); break;
    case 't-settings':        html = viewTeacherSettings(); break;
    default:                  html = viewLanding();
  }

  try {
    app.innerHTML = html;
  } catch(e) {
    console.error('render() DOM error:', e);
    app.innerHTML = `<div style="padding:40px;text-align:center;color:#ef4444">Sahifa yuklanishda xatolik. Sahifani yangilang.</div>`;
    return;
  }

  // Restore essay textarea value (innerHTML doesn't restore it)
  const ea = document.getElementById('essay-area');
  if (ea) {
    ea.value = S.essay;
    ea.addEventListener('input', onEssayInput);
  }

  // Update WC display
  if (S.view === 'write') updateWC(wc(S.essay));
}

/* ══════════════════════════════════════════
   ⌨️ INPUT HANDLERS
══════════════════════════════════════════ */
function onEssayInput(e) {
  S.essay = e.target.value;
  updateWC(wc(S.essay));
}

function updateWC(words) {
  const minW = S.taskType === '1' ? 150 : 250;
  const pct  = Math.min(100, Math.round(words / minW * 100));
  const col  = words >= minW ? 'var(--green)' : 'var(--amber)';
  const numEl = document.getElementById('wc-num');
  const barEl = document.getElementById('wc-bar');
  if (numEl) numEl.textContent = words;
  if (barEl) { barEl.style.width = pct + '%'; barEl.style.background = col; }
}

document.addEventListener('input', e => {
  const f = e.target.dataset.field;
  if (!f) return;
  const parts = f.split('.');
  if (parts.length === 3) {
    // e.g. teacherEditScores.ta.feedback
    if (!S[parts[0]]) S[parts[0]] = {};
    if (!S[parts[0]][parts[1]]) S[parts[0]][parts[1]] = {};
    S[parts[0]][parts[1]][parts[2]] = e.target.value;
  } else if (parts.length === 2) {
    if (!S[parts[0]]) S[parts[0]] = {};
    S[parts[0]][parts[1]] = e.target.value;
  } else {
    S[f] = e.target.value;
  }
});

/* ══════════════════════════════════════════
   🖱️ CLICK HANDLER
══════════════════════════════════════════ */
document.addEventListener('click', async e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const val    = el.dataset.val;

  switch(action) {
    case 'go-auth':
      // Teacher sahifasiga faqat #admin hash bilan kirish mumkin
      if (val === 'teacher' && location.hash !== '#' + ADMIN_HASH) {
        S.authMode = 'student';
      } else {
        S.authMode = val;
      }
      S.authErr  = '';
      S.authForm = {name:'',telegram:'',password:'',role:'student'};
      S.view = 'auth';
      render(); break;

    case 'toggle-auth':
      S.authMode = S.authMode === 'teacher' ? 'student' : 'teacher';
      S.authErr  = '';
      render(); break;

    case 'set-auth-mode':
      S.authMode = val;
      S.authErr  = '';
      render(); break;

    case 'set-role':
      S.authForm.role = val;
      render(); break;
    case 'login':         await doLogin(); break;
    case 'student-login': await doStudentLogin(); break;
    case 'register':      await doRegister(); break;

    case 'logout':
      clearSession();
      S.user   = null;
      S.result = null;
      S.topic  = null;
      S.essay  = '';
      S.view   = 'landing';
      render(); break;

    case 'nav':
      if (val === 'landing' && !S.user) { S.view = 'landing'; render(); break; }
      // Ustoz paneli ochilganda Supabase dan yangi data yuklanadi
      if (val === 't-home' && S.user?.role === 'teacher') {
        S.view = val; render();
        Promise.allSettled([DB.loadUsers(), DB.loadSubs()]).then(() => render());
        break;
      }
      S.view = val; render(); break;

    case 'teacher-refresh':
      toast('Yangilanmoqda…', 'info', 1500);
      await Promise.allSettled([DB.loadUsers(), DB.loadSubs()]);
      render();
      toast(`✅ Yangilandi — ${S.subs.length} ta natija yuklandi`, 'ok');
      break;

    case 'teacher-tab':
      S.teacherTab = val;
      S.teacherStudentId = null;
      S.teacherStudentSubId = null;
      render(); break;

    case 'toggle-student':
      S.teacherStudentId = S.teacherStudentId === val ? null : val;
      S.teacherStudentSubId = null;
      render(); break;

    case 'toggle-student-sub':
      S.teacherStudentSubId = S.teacherStudentSubId === val ? null : val;
      render(); break;

    case 'start-exam-task2':
      await generateTopic(); break;

    case 'set-task1-mode':
      S.task1Mode   = val;
      S.selTask1Type = null;
      render(); break;

    case 'set-task1-type':
      S.selTask1Type = val;
      render(); break;

    case 'set-practice-mode':
      S.practiceMode = val;
      // Auto-set taskType based on mode
      if (val === 'task1') S.taskType = '1';
      if (val === 'task2') S.taskType = '2';
      if (val === 'exam')  { S.taskType = '1'; S.examPhase = 1; S.examTask1Result = null; }
      S.selEssayType = null;
      S.selCat = null;
      S.selTask1Type = null;
      render(); break;

    case 'set-custom-task':
      S.customTaskType = val;
      S.selEssayType = null;
      render(); break;

    case 'set-task':
      S.taskType    = val;
      S.selEssayType = null;
      render(); break;

    case 'set-essay-type':
      S.selEssayType = val;
      render(); break;

    case 'set-cat':
      S.selCat = val;
      render(); break;

    case 'set-hist-filter':
      S.histFilter = val;
      render(); break;

    case 'generate-topic': await generateTopic(); break;
    case 'grade':          await gradeEssay(); break;

    case 'clear-essay':
      S.essay = '';
      const ea = document.getElementById('essay-area');
      if (ea) ea.value = '';
      updateWC(0);
      break;

    case 'open-sub': {
      const sub = S.subs.find(s => s.id === val);
      if (sub) { S.selSub = sub; S.teacherEdit = false; S.teacherEditScores = null; S.view = 'sub-detail'; render(); }
      break;
    }

    case 'open-sub-teacher': {
      const sub = S.subs.find(s => s.id === val);
      if (sub) { S.selSub = sub; S.teacherEdit = false; S.teacherEditScores = null; S.view = 'sub-detail-teacher'; render(); }
      break;
    }

    case 'teacher-edit-start': {
      if (!S.selSub) break;
      // Deep clone scores for editing
      S.teacherEditScores = JSON.parse(JSON.stringify(S.selSub.scores));
      S.teacherEditNote = S.selSub.scores.teacherNote || '';
      S.teacherEdit = true;
      render(); break;
    }

    case 'teacher-edit-cancel': {
      S.teacherEdit = false;
      S.teacherEditScores = null;
      S.teacherEditNote = '';
      render(); break;
    }

    case 'teacher-set-score': {
      // val = "ta:7" or "cc:5" etc.
      const [key, scoreStr] = val.split(':');
      const score = parseInt(scoreStr);
      if (!S.teacherEditScores) break;
      if (!S.teacherEditScores[key]) S.teacherEditScores[key] = {};
      S.teacherEditScores[key].score = score;
      // Recalculate overall
      const sc = S.teacherEditScores;
      sc.overall = avg([sc.ta.score, sc.cc.score, sc.lr.score, sc.gra.score]);
      render(); break;
    }

    case 'teacher-edit-save': {
      if (!S.selSub || !S.teacherEditScores) break;
      const newScores = {
        ...S.teacherEditScores,
        overall: avg([S.teacherEditScores.ta.score, S.teacherEditScores.cc.score, S.teacherEditScores.lr.score, S.teacherEditScores.gra.score]),
        teacherEdited: true,
        teacherNote: S.teacherEditNote || '',
        teacherEditedAt: new Date().toISOString(),
        teacherName: S.user.name,
      };
      await DB.updateSub(S.selSub.id, { scores: newScores });
      // Refresh selSub
      S.selSub = S.subs.find(s => s.id === S.selSub.id);
      S.teacherEdit = false;
      S.teacherEditScores = null;
      S.teacherEditNote = '';
      toast('✅ Natija muvaffaqiyatli yangilandi!', 'ok');
      render(); break;
    }

    case 'save-settings': {
      await DB.saveSettings({ ...S.sf });
      S.savedMsg = '✅ Sozlamalar saqlandi!';
      setTimeout(() => { S.savedMsg = ''; render(); }, 3000);
      toast('Sozlamalar saqlandi', 'ok');
      render(); break;
    }

    case 'save-api-key': {
      if (!S.sf.groqApiKey) { toast("API kalitni kiriting", 'err'); return; }
      await DB.saveSettings({ groqApiKey: S.sf.groqApiKey });
      S.view = S.user ? (S.user.role === 'teacher' ? 't-home' : 's-home') : 'auth';
      toast('API kaliti saqlandi', 'ok');
      render(); break;
    }

    case 'test-groq': {
      const key = S.sf.groqApiKey || S.settings.groqApiKey;
      if (!key) { toast('Avval API kalitni kiriting', 'err'); return; }
      el.disabled = true;
      try {
        const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
          body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{role:'user',content:'Say OK'}], max_tokens: 5 }),
        });
        const d = await r.json();
        if (d.error) throw new Error(d.error.message);
        toast('✅ Groq AI muvaffaqiyatli ulandi!', 'ok');
      } catch(err) {
        toast('❌ Xatolik: ' + err.message, 'err', 5000);
      } finally { el.disabled = false; }
      break;
    }

  }
});

/* ══════════════════════════════════════════
   🔐 AUTH LOGIC
══════════════════════════════════════════ */
function setLoading(on, txt = '') {
  S.loading    = on;
  S.loadingTxt = txt;
  render();
}

/* ── Session helpers ── */
function saveSession(user) {
  LS.set('iu_session', user ? { id: user.id, telegram: user.telegram } : null);
}
function clearSession() { LS.set('iu_session', null); }

async function doLogin() {
  const found = S.users.find(u => u.telegram === S.authForm.telegram && u.password === S.authForm.password);
  if (!found) { S.authErr = "Telegram ID yoki parol noto'g'ri"; render(); return; }
  S.user    = found;
  S.authErr = '';
  saveSession(found);
  const dest = found.role === 'teacher' ? 't-home' : 's-home';
  S.view = dest;
  toast(`Xush kelibsiz, ${found.name.split(' ')[0]}!`, 'ok');
  render();
  setTimeout(() => { if (S.view !== dest) { S.view = dest; render(); } }, 100);
}

// Student: login or auto-register by Telegram ID (no password) — 1 hisob kafolati
async function doStudentLogin() {
  const f = S.authForm;
  const tg = f.telegram.trim().replace(/^@/, '');
  if (!tg) { S.authErr = "Telegram username kiriting"; render(); return; }

  // Check if user exists by telegram (ID yoki username)
  const existing = S.users.find(u => u.telegram === tg);
  if (existing) {
    if (existing.role === 'teacher') {
      S.authErr = "Bu akkaunt o'qituvchi. O'qituvchi kirishidan foydalaning.";
      render(); return;
    }
    S.user    = existing;
    S.authErr = '';
    saveSession(existing);
    S.view    = 's-home';
    toast(`Xush kelibsiz, ${existing.name.split(' ')[0]}! 👋`, 'ok');
    render();
    return;
  }

  // Yangi o'quvchi — Telegram username bo'yicha 1 ta hisob
  const name = f.name.trim() || tg;
  const nu = {
    name: name, telegram: tg, password: '',
    role: 'student', id: uid(), createdAt: new Date().toISOString()
  };
  await DB.addUser(nu);
  S.user    = nu;
  S.authErr = '';
  saveSession(nu);
  S.view    = 's-home';
  toast(`Xush kelibsiz, ${nu.name.split(' ')[0]}! Avtomatik ro'yxatdan o'tdingiz 🎉`, 'ok');
  render();
}

async function doRegister() {
  const f = S.authForm;
  if (!f.name.trim() || !f.telegram.trim() || !f.password.trim()) {
    S.authErr = "Barcha maydonlarni to'ldiring"; render(); return;
  }
  // Bir Telegram ID — faqat bitta hisob
  if (S.users.find(u => u.telegram === f.telegram.trim())) {
    S.authErr = "Bu Telegram ID allaqachon ro'yxatdan o'tgan. Boshqa nom bilan kirish mumkin emas."; render(); return;
  }
  const nu = { name: f.name.trim(), telegram: f.telegram.trim(), password: f.password, role: f.role || 'student', id: uid(), createdAt: new Date().toISOString() };
  await DB.addUser(nu);
  S.user    = nu;
  S.authErr = '';
  saveSession(nu);
  const dest = nu.role === 'teacher' ? 't-home' : 's-home';
  S.view = dest;
  toast(`Xush kelibsiz, ${nu.name.split(' ')[0]}!`, 'ok');
  render();
  setTimeout(() => { if (S.view !== dest) { S.view = dest; render(); } }, 100);
}

/* ══════════════════════════════════════════
   🚀 INIT
══════════════════════════════════════════ */
async function init() {
  S.view = 'loading';
  render();

  // Load data from Supabase or localStorage
  await Promise.allSettled([
    DB.loadUsers(),
    DB.loadSubs(),
    DB.loadSettings(),
  ]);

  // Ensure Groq key is set
  if (!S.settings.groqApiKey) {
    await DB.saveSettings({ groqApiKey: GROQ_KEY });
  }

  // Restore settings form
  S.sf = {
    groqApiKey: S.settings.groqApiKey || GROQ_KEY,
  };

  // ── Restore session from localStorage ──────────
  const savedSession = LS.get('iu_session', null);
  if (savedSession && savedSession.telegram) {
    const found = S.users.find(u => u.telegram === savedSession.telegram);
    if (found) {
      S.user = found;
      S.view = found.role === 'teacher' ? 't-home' : 's-home';
      render();
      // Ustoz uchun Supabase dan yangi data yukla
      if (found.role === 'teacher') {
        Promise.allSettled([DB.loadUsers(), DB.loadSubs()]).then(() => render());
      }
      return;
    }
  }

  // ── Telegram WebApp auto-login ──────────────
  try {
    const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
    if (tgUser && tgUser.id) {
      const isTeacherTg = tgUser.id === TEACHER_TG_ID;
      // Use telegram chat ID (as string) as unique identifier — prevents multiple accounts
      const tgId       = String(tgUser.id);
      const tgUsername  = tgUser.username || `tg_${tgUser.id}`;
      const tgName      = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') || tgUsername;

      // Find user by Telegram ID (stored in telegram field) or legacy username
      let found = S.users.find(u => u.telegram === tgId) || S.users.find(u => u.telegram === tgUsername);

      if (isTeacherTg) {
        // ── Ustoz — role: teacher kafolatlanadi ──
        if (!found) {
          found = { name: 'Muhammad ustoz', telegram: tgId, password: '', role: 'teacher', id: uid(), createdAt: new Date().toISOString() };
          await DB.addUser(found);
        } else if (found.role !== 'teacher') {
          // Role ni teacher ga yangilash
          found = { ...found, role: 'teacher' };
          await DB.saveUsers(S.users.map(u => u.id === found.id ? found : u));
        }
        toast(`Xush kelibsiz, Muhammad ustoz! 🎓`, 'ok');
      } else {
        // ── Oddiy o'quvchi ── Telegram ID orqali 1 ta hisob kafolatlanadi
        if (!found) {
          found = { name: tgName, telegram: tgId, password: '', role: 'student', id: uid(), createdAt: new Date().toISOString() };
          await DB.addUser(found);
          toast(`Xush kelibsiz, ${tgName.split(' ')[0]}! 🎉`, 'ok');
        } else {
          // Agar eski hisob username bilan saqlangan bo'lsa, ID ga yangilash
          if (found.telegram !== tgId) {
            found = { ...found, telegram: tgId };
            await DB.saveUsers(S.users.map(u => u.id === found.id ? found : u));
          }
          toast(`Xush kelibsiz, ${found.name.split(' ')[0]}! 👋`, 'ok');
        }
      }

      S.user = found;
      saveSession(found);
      S.view = found.role === 'teacher' ? 't-home' : 's-home';
      render(); return;
    }
  } catch(e) { console.warn('TG WebApp:', e); }

  S.view = 'landing';
  render();
}

init();
</script>
